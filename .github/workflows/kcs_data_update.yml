name: KCS Data Update (Monday)

on:
  schedule:
    # 매주 월요일 00:00 UTC (한국 시간 월요일 09:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update-kcs-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 레포지토리 쓰기 권한 필요

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # 추가 패키지 확인 (크롤러에 필요)
        pip install pandas selenium webdriver-manager

    - name: Set up Chrome
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable

    - name: Run KCS Crawler
      run: |
        echo "Running KCS Crawler..."
        python data/crawler_kcs.py

    - name: Run KCS Data Update
      run: |
        echo "Running KCS Data Update..."
        python data/update_kcs_data.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/data_kcs.json data/data_kcs_backup.json
        # 변경사항이 있을 때만 커밋
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update KCS data [skip ci]" && git push)
