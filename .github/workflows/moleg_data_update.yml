name: MOLEG Data Update (Tuesday)

on:
  schedule:
    # 매주 화요일 00:00 UTC (한국 시간 화요일 09:00)
    - cron: '0 0 * * 2'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update-moleg-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 레포지토리 쓰기 권한 필요

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # 추가 패키지 확인 (크롤러에 필요)
        pip install pandas selenium webdriver-manager

    - name: Set up Chrome
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable

    - name: Run MOLEG Crawler
      run: |
        echo "Running MOLEG Crawler..."
        python data/crawler_moleg.py

    - name: Run MOLEG Data Update
      run: |
        echo "Running MOLEG Data Update..."
        python data/update_moleg_data.py

    - name: Run Vectorization Cache Update
      run: |
        echo "Updating vectorization cache..."
        python update_vectorization_cache.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data_moleg.json data_moleg_backup.json vectorization_cache.pkl.gz
        # 변경사항이 있을 때만 커밋
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update MOLEG data and cache [skip ci]" && git push)
